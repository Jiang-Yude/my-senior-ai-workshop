<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>樂齡 AI 工作坊｜拍一張照片，做一部自己的電影 · 江江教練</title>
<meta name="description" content="給長輩的三小時 AI 課，一支手機就能完成。用自己的故事和照片，做出電影海報和繪本。" />
<style>
  :root{
    --bg:#F5EDE7; --panel:#FFFBF4; --panel-2:#F8F1E8;
    --ink:#4E342E; --ink-strong:#3E2723; --muted:#6D5449;
    --line:rgba(120,90,70,0.18); --accent:#D26A4C; --accent-deep:#B4502F;
    --font:"PingFang TC","Noto Sans TC","Inter",system-ui,sans-serif;
    --serif:"Songti TC","Noto Serif TC","PingFang TC",serif;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth; font-size:20px;}
  body{margin:0; font-family:var(--font); background:var(--bg); color:var(--ink); line-height:1.8; -webkit-font-smoothing:antialiased;}
  img{max-width:100%; display:block;}
  .wrap{width:100%; max-width:960px; margin:0 auto; padding:0 24px;}
  section{padding:44px 0;}

  .eyebrow{display:inline-flex; align-items:center; gap:8px; font-size:0.82rem; letter-spacing:0.1em; font-weight:700; color:var(--accent-deep); background:#fff; border:1px solid var(--line); padding:8px 16px; border-radius:999px;}
  h1{font-family:var(--serif); font-size:clamp(2rem,5.2vw,3.1rem); line-height:1.25; font-weight:800; color:var(--ink-strong); margin:20px 0 14px;}
  .lead{font-size:clamp(1.05rem,2vw,1.28rem); color:var(--ink); max-width:640px;}
  .lead b{color:var(--accent-deep);}

  /* 字級調整 */
  .font-tool{position:fixed; right:16px; bottom:16px; z-index:120; display:flex; gap:6px; background:rgba(255,251,244,0.94); border:1px solid var(--line); border-radius:999px; padding:6px; box-shadow:0 6px 20px rgba(78,52,46,0.16);}
  .font-tool button{border:none; background:var(--panel-2); color:var(--ink-strong); width:40px; height:40px; border-radius:999px; font-weight:700; cursor:pointer;}
  .font-tool button:hover{background:var(--accent); color:#fff;}
  .font-tool .big{font-size:1.15rem;}

  .hero{background:linear-gradient(180deg,#FBF6F0,#F5EDE7); padding:64px 0 24px;}

  /* 成品範例 */
  h2{font-family:var(--serif); font-size:clamp(1.4rem,3.2vw,1.9rem); font-weight:800; color:var(--ink-strong); margin:0 0 6px;}
  .sub{color:var(--muted); font-size:0.98rem; margin:0 0 26px;}
  .poster-row{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
  .poster{background:#fff; border:1px solid var(--line); border-radius:16px; padding:12px; box-shadow:0 12px 30px rgba(78,52,46,0.13); cursor:zoom-in; transition:.25s;}
  .poster:hover{transform:translateY(-4px); box-shadow:0 18px 40px rgba(78,52,46,0.2);}
  .poster img{border-radius:10px; width:100%; aspect-ratio:3/4; object-fit:cover;}
  .poster .cap{text-align:center; font-weight:700; color:var(--accent-deep); padding:12px 4px 4px; font-size:0.92rem;}

  .book{margin-top:20px; background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px; display:grid; grid-template-columns:200px 1fr; gap:24px; align-items:center; box-shadow:0 12px 30px rgba(78,52,46,0.13);}
  .book-thumb{border:none; background:none; padding:0; cursor:pointer;}
  .book-thumb img{border-radius:10px; box-shadow:0 8px 20px rgba(78,52,46,0.18); transition:.25s;}
  .book-thumb:hover img{transform:scale(1.02);}
  .book-thumb .hint{display:block; margin-top:10px; font-size:0.86rem; font-weight:700; color:var(--accent-deep); text-align:center;}
  .book-text h3{margin:0 0 6px; font-size:1.2rem; color:var(--ink-strong);}
  .book-text p{margin:0; color:var(--muted); font-size:0.98rem;}

  /* 教什麼（極簡三點） */
  .learn{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:28px 30px; margin-top:8px;}
  .learn h2{margin-bottom:16px;}
  .learn ul{margin:0; padding:0; list-style:none; display:grid; gap:12px;}
  .learn li{display:flex; gap:14px; align-items:flex-start; font-size:1.06rem; color:var(--ink);}
  .learn li b{color:var(--ink-strong);}
  .learn li span{font-size:1.5rem; line-height:1.2;}

  .close{text-align:center; color:var(--muted); padding:40px 0 56px;}
  .close b{color:var(--ink-strong);}

  /* Lightbox */
  .lb{position:fixed; inset:0; background:rgba(40,26,20,0.92); display:none; place-items:center; z-index:300;}
  .lb.open{display:grid;}
  .lb img{max-width:90vw; max-height:82vh; border-radius:10px; box-shadow:0 20px 60px rgba(0,0,0,0.5);}
  .lb .count{position:absolute; top:22px; left:0; right:0; text-align:center; color:#F5EDE0; font-weight:700;}
  .lb button{position:absolute; border:none; background:rgba(255,255,255,0.14); color:#fff; width:56px; height:56px; border-radius:50%; font-size:1.6rem; cursor:pointer; display:grid; place-items:center; transition:.2s;}
  .lb button:hover{background:var(--accent);}
  .lb .close-x{top:20px; right:20px; width:48px; height:48px;}
  .lb .prev{left:18px; top:50%; transform:translateY(-50%);}
  .lb .next{right:18px; top:50%; transform:translateY(-50%);}

  @media (max-width:560px){
    section{padding:34px 0;}
    .poster-row{grid-template-columns:1fr 1fr; gap:12px;}
    .poster{padding:8px;}
    .poster .cap{font-size:0.8rem;}
    .book{grid-template-columns:1fr; text-align:center;}
    .book-thumb img{margin:0 auto;}
    .lb .prev{left:8px;} .lb .next{right:8px;}
  }
</style>
</head>
<body>

<div class="font-tool" aria-label="調整字級">
  <button class="font-minus" title="縮小字">A−</button>
  <button class="font-plus big" title="放大字">A＋</button>
</div>

<!-- Hero -->
<header class="hero">
  <div class="wrap">
    <span class="eyebrow">樂齡 AI 工作坊 · 三小時</span>
    <h1>拍一張照片，<br>做一部自己的電影</h1>
    <p class="lead">給長輩的 AI 課，<b>一支手機就能完成</b>。用自己的故事和照片，做出電影海報和繪本。</p>
  </div>
</header>

<!-- 成品範例（放最前面） -->
<section>
  <div class="wrap">
    <h2>成品長這樣</h2>
    <p class="sub">主角是自己，故事也是自己的。點圖看大圖。</p>
    <div class="poster-row">
      <button class="poster" data-open="poster1" aria-label="放大海報一">
        <img src="images/poster-tomato.jpg" alt="電影海報範例一" loading="lazy">
        <div class="cap">自己的電影海報 ①</div>
      </button>
      <button class="poster" data-open="poster2" aria-label="放大海報二">
        <img src="images/poster-neighbor.jpg" alt="電影海報範例二" loading="lazy">
        <div class="cap">自己的電影海報 ②</div>
      </button>
    </div>
    <div class="book">
      <button class="book-thumb" data-open="book" aria-label="翻閱繪本">
        <img src="images/cover.jpg" alt="繪本封面" loading="lazy">
        <span class="hint">點圖翻 15 頁 ⤢</span>
      </button>
      <div class="book-text">
        <h3>還能做成一本小繪本</h3>
        <p>同一個故事變成水彩繪本，可以念給孫子聽，也能印出來送家人。</p>
      </div>
    </div>
  </div>
</section>

<!-- 教什麼（極簡） -->
<section style="padding-top:0;">
  <div class="wrap">
    <div class="learn">
      <h2>這堂課教你</h2>
      <ul>
        <li><span>🗣️</span><div>把<b>自己的故事</b>說出來。不會說沒關係，有 <b>AI 說故事老師</b>幫你一問一答。</div></li>
        <li><span>📷</span><div>學<b>怎麼拍</b>。老師帶構圖、分鏡，教你拍出一張適合當底圖的照片。</div></li>
        <li><span>🎬</span><div>用 AI 做成<b>電影海報和繪本</b>，當天帶著作品回家。</div></li>
      </ul>
    </div>
  </div>
</section>

<!-- 結語 -->
<div class="close">
  <div class="wrap">
    有興趣開課，再跟我聊細節。<br>
    <b>江江教練（江昱德）</b>
  </div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" aria-hidden="true">
  <div class="count" id="lb-count"></div>
  <button class="close-x" id="lb-close" aria-label="關閉">✕</button>
  <button class="prev" id="lb-prev" aria-label="上一張">‹</button>
  <img id="lb-img" src="" alt="放大檢視">
  <button class="next" id="lb-next" aria-label="下一張">›</button>
</div>

<script>
(function(){
  var sizes=[20,22,24,26,28], idx=0, root=document.documentElement;
  function apply(){ root.style.fontSize=sizes[idx]+'px'; }
  document.querySelector('.font-plus').onclick=function(){ if(idx<sizes.length-1){idx++; apply();} };
  document.querySelector('.font-minus').onclick=function(){ if(idx>0){idx--; apply();} };

  var bookPages=Array.from({length:15},function(_,i){return 'images/storybook/tomato-'+String(i+1).padStart(2,'0')+'.jpg';});
  var sets={ poster1:['images/poster-tomato.jpg'], poster2:['images/poster-neighbor.jpg'], book:bookPages };
  var lb=document.getElementById('lb'), img=document.getElementById('lb-img'),
      count=document.getElementById('lb-count'), prev=document.getElementById('lb-prev'), next=document.getElementById('lb-next');
  var cur=[], pos=0;
  function show(){ img.src=cur[pos]; var multi=cur.length>1; count.textContent=multi?(pos+1)+' / '+cur.length:''; prev.style.display=multi?'grid':'none'; next.style.display=multi?'grid':'none'; }
  function open(set){ cur=set; pos=0; show(); lb.classList.add('open'); lb.setAttribute('aria-hidden','false'); document.body.style.overflow='hidden'; }
  function close(){ lb.classList.remove('open'); lb.setAttribute('aria-hidden','true'); document.body.style.overflow=''; }
  function go(d){ pos=(pos+d+cur.length)%cur.length; show(); }
  document.querySelectorAll('[data-open]').forEach(function(el){ el.addEventListener('click',function(){ var s=sets[el.dataset.open]; if(s) open(s); }); });
  document.getElementById('lb-close').onclick=close;
  next.onclick=function(){go(1);}; prev.onclick=function(){go(-1);};
  lb.addEventListener('click',function(e){ if(e.target===lb) close(); });
  document.addEventListener('keydown',function(e){ if(!lb.classList.contains('open'))return; if(e.key==='Escape')close(); else if(e.key==='ArrowRight')go(1); else if(e.key==='ArrowLeft')go(-1); });
})();
</script>
</body>
</html>
